<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafaf7; color: #222; }
  header {
    padding: 12px 18px; background: #fff; border-bottom: 1px solid #e4e4e0;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .subtitle { font-size: 11px; color: #666; }
  #viewport { width: 100vw; height: 100vh; background: #fafaf7; overflow: hidden; position: relative; touch-action: none; }
  #stage { width: 100%; height: 100%; }
  #miro { width: 100%; height: 100%; display: block; }

  /* Hotspot overlay */
  .hotspot {
    fill: transparent; stroke: transparent;
    cursor: pointer; pointer-events: all;
    transition: fill 0.12s, stroke 0.12s;
  }
  .hotspot:hover {
    fill: rgba(40, 100, 220, 0.10);
    stroke: rgba(40, 100, 220, 0.55);
    stroke-width: 1.2;
    stroke-dasharray: 3 2;
  }

  #tooltip {
    position: fixed; pointer-events: none; display: none;
    background: #fff; border: 1px solid #d0d0cc; border-radius: 8px;
    padding: 10px 12px; max-width: 340px; font-size: 12px; line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.14); z-index: 100;
  }
  #tooltip .tt-title { font-weight: 700; margin-bottom: 4px; color: #1a1a1a; }
  #tooltip .tt-desc { color: #444; margin-bottom: 6px; }
  #tooltip .tt-refs { border-top: 1px solid #eee; padding-top: 6px; margin-top: 6px; }
  #tooltip .tt-ref { font-size: 11px; color: #5a5a5a; margin-bottom: 2px; }
  #tooltip .tt-ref b { color: #333; }

  #controls {
    position: absolute; bottom: 14px; right: 14px; display: flex; flex-direction: column; gap: 4px;
    background: #fff; border: 1px solid #e0e0dc; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden; z-index: 10;
  }
  #controls button {
    width: 36px; height: 32px; border: none; background: #fff; cursor: pointer;
    font-size: 14px; color: #444; border-bottom: 1px solid #eee;
  }
  #controls button:last-child { border-bottom: none; }
  #controls button:hover { background: #f4f4f0; }

  .hint {
    position: absolute; bottom: 14px; left: 14px; font-size: 11px; color: #777;
    background: rgba(255,255,255,0.85); padding: 6px 10px; border-radius: 6px; border: 1px solid #e0e0dc;
    z-index: 10;
  }
  @media print { #controls, .hint, header { display: none !important; } #viewport { height: 100vh; } }
</style>

tip":"Ricorso contro la decisione di ritiro implicito.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"67(1)(c)","nota":"Ricorso contro ritiro implicito"},{"reg":"Reg. (UE) 2024/1348","art":"68","nota":"Effetto sospensivo"}]},"proc_accelerata":{"bbox":[728.5,612.8,89.4,47.2],"label":"PROCEDURA ACCELERATA (12 settimane / 3 mesi) — In rosso: anche per MSNA","tooltip":"Esame nel merito accelerato. Alla frontiera: max 12 settimane (prorogabile a 16). I casi in rosso tra le cause possono applicarsi anche ai MSNA.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42","nota":"Procedura d'esame accelerata"},{"reg":"Reg. (UE) 2024/1348","art":"51","nota":"Termini — procedura di frontiera (12 sett.)"}]},"pericolosi_acc":{"bbox":[1005.8,534.6,32.7,17.1],"label":"Pericolosi","tooltip":"Richiedente che costituisce minaccia per la sicurezza nazionale o l'ordine pubblico.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)(f)","nota":"Minaccia sicurezza/ordine pubblico"}]},"distruzione_doc":{"bbox":[1004.2,563.9,35.8,22.1],"label":"Distruzione documenti","tooltip":"Occultamento/distruzione di documenti di identità o di viaggio per ingannare le autorità.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)(g)","nota":"Induzione in errore"}]},"paese_origine_sicuro":{"bbox":[998.6,600.5,48.0,32.2],"label":"Paese origine sicuro o con meno del 20% di riconoscimento","tooltip":"Richiedente proveniente da paese di origine designato sicuro, o con tasso di riconoscimento UE < 20%.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)(h), (j)","nota":"Paese origine sicuro / basso tasso"},{"reg":"Reg. (UE) 2024/1348","art":"61","nota":"Concetto di paese di origine sicuro"}]},"reiterate_acc":{"bbox":[1004.14,649.15,34.61,13.04],"label":"Reiterate","tooltip":"Domande reiterate: esame accelerato (alternativa all'inammissibilità).","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)(d)","nota":"Reiterate in accelerata"}]},"dichiarazioni_incoerenti":{"bbox":[1004.14,678.23,35.48,29.66],"label":"Dichiarazioni palesemente incoerenti, contraddittorie, evidentemente improbabili","tooltip":"Dichiarazioni che contraddicono informazioni pertinenti sul paese di origine (COI), rendendo \"chiaramente non convincente\" la richiesta.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)(b)","nota":"Dichiarazioni manifestamente inattendibili"}]},"altri_casi_28bis":{"bbox":[999.5,724.6,44.5,22.1],"label":"Altri casi simili al 28bis","tooltip":"Riferimento al previgente art. 28-bis D.lgs. 25/2008: altri casi di accelerata (es. domanda manifestamente infondata, dilatoria).","refs":[{"reg":"Reg. (UE) 2024/1348","art":"42(1)","nota":"Casi di accelerata"},{"reg":"D.lgs. 25/2008","art":"28-bis","nota":"Norma italiana di raccordo"}]},"ricorso_5_10_c":{"bbox":[1097.5,596.6,66.1,40.1],"label":"RICORSO (5-10 GG) — post-accelerata","tooltip":"Ricorso contro rigetto in procedura accelerata. Effetto sospensivo spesso non automatico.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"67","nota":"Diritto al ricorso"},{"reg":"Reg. (UE) 2024/1348","art":"68","nota":"Effetto sospensivo"}]},"riconoscimento":{"bbox":[1099.2,656.6,62.7,30.1],"label":"RICONOSCIMENTO PROTEZIONE","tooltip":"Concessione dello status di rifugiato o della protezione sussidiaria (o, in Italia, della protezione speciale).","refs":[{"reg":"Reg. (UE) 2024/1347","art":"—","nota":"Regolamento qualifiche"},{"reg":"D.lgs. 251/2007","art":"—","nota":"Attuazione italiana qualifiche"}]},"ricorso_15_30":{"bbox":[1096.9,710.9,67.3,40.1],"label":"RICORSO (15-30 GG) — post-ordinaria","tooltip":"Termine ordinario per impugnare il rigetto in procedura ordinaria. Effetto sospensivo tendenzialmente automatico.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"67","nota":"Ricorso effettivo"},{"reg":"Reg. (UE) 2024/1348","art":"68","nota":"Effetto sospensivo — regime ordinario"}]},"proc_ordinaria":{"bbox":[782.5,742.0,69.6,47.2],"label":"PROCEDURA ORDINARIA (6+6+3 MESI)","tooltip":"Esame ordinario: 6 mesi ordinari + 6 mesi proroga in casi complessi + 3 mesi eccezionali. Totale max 15 mesi.","refs":[{"reg":"Reg. (UE) 2024/1348","art":"35","nota":"Durata procedura d'esame"},{"reg":"Reg. (UE) 2024/1348","art":"34","nota":"Procedura amministrativa"}]}};

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('miro');
  // Ensure svg has viewBox; if missing, build from width/height
  if (!svg.getAttribute('viewBox')) {
    const w = parseFloat(svg.getAttribute('width')) || 1263.12;
    const h = parseFloat(svg.getAttribute('height')) || 806.88;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  }
  svg.removeAttribute('width');
  svg.removeAttribute('height');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Create hotspot layer ON TOP of the SVG content
  const hotspotLayer = document.createElementNS(SVG_NS, 'g');
  hotspotLayer.setAttribute('id', 'hotspots');
  svg.appendChild(hotspotLayer);

  function bindHotspot(r) {
    const node = NODES[r.getAttribute('data-id')];
    if (!node) return;
    r.addEventListener('mouseenter', ev => showTooltip(ev, node));
    r.addEventListener('mousemove', moveTooltip);
    r.addEventListener('mouseleave', hideTooltip);
  }

  Object.entries(NODES).forEach(([id, node]) => {
    const [x, y, w, h] = node.bbox;
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', w);
    r.setAttribute('height', h);
    r.setAttribute('rx', 3);
    r.setAttribute('class', 'hotspot');
    r.setAttribute('data-id', id);
    bindHotspot(r);
    hotspotLayer.appendChild(r);
  });

  // Tooltip
  const tooltipEl = document.getElementById('tooltip');
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showTooltip(ev, n) {
    let html = `<div class="tt-title">${escapeHtml(n.label)}</div>`;
    if (n.tooltip) html += `<div class="tt-desc">${escapeHtml(n.tooltip)}</div>`;
    if (n.refs && n.refs.length) {
      html += '<div class="tt-refs">';
      n.refs.forEach(r => {
        const artStr = r.art && r.art !== '—' ? `, art. ${escapeHtml(r.art)}` : '';
        html += `<div class="tt-ref"><b>${escapeHtml(r.reg)}${artStr}</b>${r.nota ? ' — ' + escapeHtml(r.nota) : ''}</div>`;
      });
      html += '</div>';
    }
    tooltipEl.innerHTML = html;
    tooltipEl.style.display = 'block';
    moveTooltip(ev);
  }
  function moveTooltip(ev) {
    const pad = 14;
    const r = tooltipEl.getBoundingClientRect();
    let x = ev.clientX + pad;
    let y = ev.clientY + pad;
    if (x + r.width > window.innerWidth - 10) x = ev.clientX - r.width - pad;
    if (y + r.height > window.innerHeight - 10) y = ev.clientY - r.height - pad;
    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top = y + 'px';
  }
  function hideTooltip() { tooltipEl.style.display = 'none'; }

  // Pan + zoom.
  // ATTENZIONE: se svgPanZoom inizializza con fit:true mentre il contenitore
  // non e' ancora dimensionato (iframe lazy, tab in background), calcola una
  // matrice degenere matrix(0,...) da cui non sa piu' uscire (fit() e persino
  // destroy() lanciano "matrix not invertible", e l'istanza rotta resta nella
  // cache interna della libreria). Percio': (1) inizializza SOLO quando l'svg
  // ha dimensioni reali; (2) se l'istanza e' comunque degenere, recupero duro
  // sostituendo l'elemento (svuota la cache) e rilegando i tooltip.
  const PZ_OPTS = {
    zoomEnabled: true, controlIconsEnabled: false,
    fit: true, center: true, minZoom: 0.3, maxZoom: 8,
    zoomScaleSensitivity: 0.3, dblClickZoomEnabled: false,
  };
  const VIEWBOX = '0 0 1263.12 806.88';
  let panZoom = null;

  function healthy() {
    if (!panZoom) return false;
    try {
      const z = panZoom.getZoom();
      const vp = document.querySelector('.svg-pan-zoom_viewport');
      const t = (vp && vp.getAttribute('transform')) || '';
      return isFinite(z) && z > 0.001 && !/matrix\(0[,\s]/.test(t);
    } catch (e) { return false; }
  }

  function hardReset() {
    const el = document.getElementById('miro');
    try { panZoom && panZoom.destroy(); } catch (e) {
      // destroy fallito: srotola a mano il viewport della libreria
      const vp = el.querySelector('.svg-pan-zoom_viewport');
      if (vp) { while (vp.firstChild) el.appendChild(vp.firstChild); vp.remove(); }
    }
    // sostituire l'elemento svuota la cache per-elemento di svg-pan-zoom
    const clone = el.cloneNode(true);
    clone.setAttribute('viewBox', VIEWBOX);
    const inner = clone.querySelector('.svg-pan-zoom_viewport');
    if (inner) inner.removeAttribute('transform');
    el.replaceWith(clone);
    clone.querySelectorAll('.hotspot').forEach(bindHotspot);
    panZoom = null;
  }

  function ensurePanZoom() {
    if (healthy()) return;
    if (panZoom) hardReset();
    const el = document.getElementById('miro');
    if (!el || !el.clientWidth || !el.clientHeight) return; // non ancora dimensionato: riprova dopo
    panZoom = svgPanZoom('#miro', PZ_OPTS);
    if (!healthy()) hardReset();
  }

  ensurePanZoom();
  requestAnimationFrame(ensurePanZoom);
  window.addEventListener('load', ensurePanZoom);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) ensurePanZoom(); });
  let pzTries = 0;
  const pzTimer = setInterval(() => {
    ensurePanZoom();
    if (healthy() || ++pzTries > 25) clearInterval(pzTimer);
  }, 400);

  document.getElementById('btn-in').onclick = () => { if (healthy()) panZoom.zoomIn(); else ensurePanZoom(); };
  document.getElementById('btn-out').onclick = () => { if (healthy()) panZoom.zoomOut(); else ensurePanZoom(); };
  document.getElementById('btn-reset').onclick = () => {
    if (!healthy()) { ensurePanZoom(); return; }
    panZoom.resize(); panZoom.fit(); panZoom.center();
  };
  window.addEventListener('resize', () => {
    if (!healthy()) { ensurePanZoom(); return; }
    try { panZoom.resize(); panZoom.fit(); panZoom.center(); } catch (e) { ensurePanZoom(); }
  });
  </script>
